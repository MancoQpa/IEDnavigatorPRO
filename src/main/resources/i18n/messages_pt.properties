# Legenda de ícones (IEDNavigatorApp.java)
legend.nodetypes.title=Tipos de nó na árvore
legend.nodetypes.ld=<b>LD</b> — Logical Device (Dispositivo Lógico)
legend.nodetypes.do=<b>DO</b> — Data Object (Objeto de Dados)
legend.nodetypes.da=<b>DA / BDA</b> — Data Attribute (Atributo de Dado)
legend.lngroups.title=Nós Lógicos (LN) por grupo IEC 61850-7-4
legend.lngroups.x=<b>Grupo X</b> — Equipamentos de corte: XCBR (disjuntor)
legend.lngroups.xc=<b>Grupo X / C</b> — Seccionadoras e controle: XSWI, CSWI, CILO
legend.lngroups.c=<b>Grupo C</b> — Controle: CPOW, CPDM e outros
legend.lngroups.m1=<b>Grupo M</b> — Medição: MMXU, MSQI, MHAI (medidor azul)
legend.lngroups.m2=<b>Grupo M</b> — Energia e demanda: MMTR, MSTA (medidor verde)
legend.lngroups.p=<b>Grupo P</b> — Proteção: PDIS, PDIF, PTRC, PDIR…
legend.lngroups.r=<b>Grupo R</b> — Funções relacionadas à proteção: RREC, RPSB, RSYN…
legend.lngroups.a=<b>Grupo A</b> — Controle automático: ATCC, ARCO, ARIS…
legend.lngroups.l=<b>Grupo L</b> — Nós de sistema: LLN0 (nó zero), LPHD (saúde do IED)
legend.lngroups.g=<b>Grupo G</b> — Genérico: GAPC, GGIO
legend.lngroups.s=<b>Grupo S</b> — Supervisão e sensores: STMP, SARC, SIMG…
legend.lngroups.t=<b>Grupo T</b> — Transformadores de instrumento: TCTR, TVTR
legend.lngroups.i=<b>Grupo I</b> — Interface: IHMI, ITCI, ITMI…
legend.lngroups.z=<b>Grupo Z</b> — Outros equipamentos de potência: ZAXN, ZBAT…
legend.lngroups.unclassified=<b>Não classificado</b> — LN com nome personalizado de fabricante não reconhecido
legend.breaker.title=Estados do disjuntor (DA stVal)
legend.breaker.on=<b>Fechado / ON</b> — Contato fechado (valor 2)
legend.breaker.off=<b>Aberto / OFF</b> — Contato aberto (valor 1)
legend.breaker.intermediate=<b>Intermediário / Transitório</b> — Estado indefinido (valor 0 ou 3)
legend.colors.title=Cores de texto na árvore
legend.colors.green=Verde — Valor ativo: ON, OK, CLOSED, TRUE
legend.colors.red=Vermelho — Valor inativo: OFF, ALARM, OPEN, FALSE
legend.colors.orange=Laranja — Aviso: INTERMEDIATE, BAD, WARNING, TEST
legend.colors.purple=Roxo — Nó bloqueado (FC=BL, blkEna=true)
legend.colors.blue=Azul — Nó na Watchlist (monitoramento ativo)
legend.fc.title=Functional Constraints (FC) — IEC 61850-7-2
legend.fc.st=<b>Status</b> — Estado do processo: stVal, q, t. Somente leitura pelo cliente.
legend.fc.mx=<b>Measurands</b> — Medições analógicas em tempo real: mag.f, q, t.
legend.fc.co=<b>Control</b> — Comandos de manobra: Oper, SBOw, Cancel.
legend.fc.cf=<b>Configuration</b> — Parâmetros de configuração do IED.
legend.fc.dc=<b>Description</b> — Placa do equipamento: VendorName, Model, SerialNum.
legend.fc.sp=<b>Setting</b> — Ajustes operacionais do IED (setpoints de proteção).
legend.fc.sg=<b>Setting Group</b> — Seletor do grupo de ajustes ativo.
legend.fc.se=<b>Setting Group Edit</b> — Edição do grupo de ajustes inativo.
legend.fc.bl=<b>Blocking</b> — Bloqueio funcional: blkEna desabilita a operação do LN.
legend.fc.ex=<b>Extended</b> — Atributos proprietários do fabricante.
legend.fc.or=<b>Operate Received</b> — Confirmação de recebimento da operação.
legend.fc.rp=<b>Unbuffered Report</b> — Controle de relatório sem buffer (URCB).
legend.fc.br=<b>Buffered Report</b> — Controle de relatório com buffer, mantém histórico (BRCB).
legend.fc.go=<b>GOOSE</b> — Atributos de controle para publicação GOOSE (GoCB).
legend.cdc.title=Common Data Classes (CDC) — IEC 61850-7-3
legend.cdc.hdr.binary=Estado binário
legend.cdc.sps=Single Point Status — stVal <i>BOOL</i>. Uso: sinais ON/OFF (alarmes, contatos auxiliares).
legend.cdc.dps=Double Point Status — stVal {off | intermediate | on | bad}. Uso: disjuntores e seccionadoras.
legend.cdc.act=Protection Activation — general <i>BOOL</i> + phsA/B/C. Uso: PTRC, PDIF, sinais de disparo.
legend.cdc.acd=Directional Protection Activation — general + dirGeneral {forward | backward}. Uso: PDIR, PDIS.
legend.cdc.hdr.intenum=Estado inteiro / enumerado
legend.cdc.ins=Integer Status — stVal <i>INT32</i>. Uso: posição de tap, contadores, modos de operação.
legend.cdc.ens=Enumerated Status — stVal <i>enum</i>. Uso: estados nomeados de equipamentos.
legend.cdc.bcr=Binary Counter Reading — actVal <i>INT64</i>. Uso: MMTR (energia ativa kWh, reativa kVArh).
legend.cdc.hdr.analog=Medição analógica
legend.cdc.mv=Measured Value — mag.f <i>FLOAT32</i> escalar. Uso: frequência, temperatura, potência total.
legend.cdc.cmv=Complex Measured Value — cVal.mag.f + cVal.ang.f. Uso: fasorial monofásico (ponteiro complexo).
legend.cdc.wye=Three Phase Y — phsA/phsB/phsC do tipo CMV. Uso: tensões MMXU (Va/Vb/Vc) e correntes.
legend.cdc.del=Three Phase Δ — phsAB/phsBC/phsCA do tipo CMV. Uso: tensões de linha MMXU.
legend.cdc.seq=Sequence Components — c1/c2/c0 CMV. Uso: MSQI (componentes simétricas: direta, inversa, homopolar).
legend.cdc.hmv=Harmonic Measured Value — array de harmônicos. Uso: MHAI (THD, H1–H50 de tensão e corrente).
legend.cdc.hdr.control=Controle (comandáveis)
legend.cdc.spc=Single Point Controllable — stVal BOOL + Oper. Uso: controle simples (LED, bloqueio, reset).
legend.cdc.dpc=Double Point Controllable — stVal DPS + Oper. Uso: disjuntores (XCBR) e seccionadoras (XSWI/CSWI).
legend.cdc.apc=Analogue Point Controllable — setMag FLOAT32 + Oper. Uso: setpoint analógico (tensão de referência).
legend.cdc.bsc=Binary Controlled Step — valWTr + Oper RAISE/LOWER. Uso: regulador de tap (ATCC, ITCP).
