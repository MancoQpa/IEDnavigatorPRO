# IEDNavigatorApp.java buildLegendContent()
legend.nodetypes.title=Node types in the tree
legend.nodetypes.ld=<b>LD</b> — Logical Device
legend.nodetypes.do=<b>DO</b> — Data Object
legend.nodetypes.da=<b>DA / BDA</b> — Data Attribute
legend.lngroups.title=Logical Nodes (LN) by group IEC 61850-7-4
legend.lngroups.x=<b>Group X</b> — Switching equipment: XCBR (circuit breaker)
legend.lngroups.xc=<b>Group X / C</b> — Disconnectors and control: XSWI, CSWI, CILO
legend.lngroups.c=<b>Group C</b> — Control: CPOW, CPDM and others
legend.lngroups.m1=<b>Group M</b> — Measurement: MMXU, MSQI, MHAI (blue meter)
legend.lngroups.m2=<b>Group M</b> — Energy and demand: MMTR, MSTA (green meter)
legend.lngroups.p=<b>Group P</b> — Protection: PDIS, PDIF, PTRC, PDIR…
legend.lngroups.r=<b>Group R</b> — Protection-related functions: RREC, RPSB, RSYN…
legend.lngroups.a=<b>Group A</b> — Automatic control: ATCC, ARCO, ARIS…
legend.lngroups.l=<b>Group L</b> — System nodes: LLN0 (zero node), LPHD (IED health)
legend.lngroups.g=<b>Group G</b> — Generic: GAPC, GGIO
legend.lngroups.s=<b>Group S</b> — Supervision and sensors: STMP, SARC, SIMG…
legend.lngroups.t=<b>Group T</b> — Instrument transformers: TCTR, TVTR
legend.lngroups.i=<b>Group I</b> — Interface: IHMI, ITCI, ITMI…
legend.lngroups.z=<b>Group Z</b> — Other power equipment: ZAXN, ZBAT…
legend.lngroups.unclassified=<b>Unclassified</b> — LN with a vendor-custom name not recognized
legend.breaker.title=Breaker states (DA stVal)
legend.breaker.on=<b>Closed / ON</b> — Contact closed (value 2)
legend.breaker.off=<b>Open / OFF</b> — Contact open (value 1)
legend.breaker.intermediate=<b>Intermediate / Transient</b> — Undefined state (value 0 or 3)
legend.colors.title=Text colors in the tree
legend.colors.green=Green — Active value: ON, OK, CLOSED, TRUE
legend.colors.red=Red — Inactive value: OFF, ALARM, OPEN, FALSE
legend.colors.orange=Orange — Warning: INTERMEDIATE, BAD, WARNING, TEST
legend.colors.purple=Purple — Blocked node (FC=BL, blkEna=true)
legend.colors.blue=Blue — Node in Watchlist (active monitoring)
legend.fc.title=Functional Constraints (FC) — IEC 61850-7-2
legend.fc.st=<b>Status</b> — Process state: stVal, q, t. Read-only from client.
legend.fc.mx=<b>Measurands</b> — Real-time analog measurements: mag.f, q, t.
legend.fc.co=<b>Control</b> — Switching commands: Oper, SBOw, Cancel.
legend.fc.cf=<b>Configuration</b> — IED configuration parameters.
legend.fc.dc=<b>Description</b> — Equipment nameplate: VendorName, Model, SerialNum.
legend.fc.sp=<b>Setting</b> — IED operational settings (protection setpoints).
legend.fc.sg=<b>Setting Group</b> — Selector of the active settings group.
legend.fc.se=<b>Setting Group Edit</b> — Editing of the inactive settings group.
legend.fc.bl=<b>Blocking</b> — Functional blocking: blkEna disables LN operation.
legend.fc.ex=<b>Extended</b> — Vendor-proprietary attributes.
legend.fc.or=<b>Operate Received</b> — Confirmation of operation reception.
legend.fc.rp=<b>Unbuffered Report</b> — Unbuffered report control (URCB).
legend.fc.br=<b>Buffered Report</b> — Buffered report control, keeps history (BRCB).
legend.fc.go=<b>GOOSE</b> — Control attributes for GOOSE publication (GoCB).
legend.cdc.title=Common Data Classes (CDC) — IEC 61850-7-3
legend.cdc.hdr.binary=Binary state
legend.cdc.sps=Single Point Status — stVal <i>BOOL</i>. Use: ON/OFF signals (alarms, auxiliary contacts).
legend.cdc.dps=Double Point Status — stVal {off | intermediate | on | bad}. Use: breakers and disconnectors.
legend.cdc.act=Protection Activation — general <i>BOOL</i> + phsA/B/C. Use: PTRC, PDIF, trip signals.
legend.cdc.acd=Directional Protection Activation — general + dirGeneral {forward | backward}. Use: PDIR, PDIS.
legend.cdc.hdr.intenum=Integer / enumerated state
legend.cdc.ins=Integer Status — stVal <i>INT32</i>. Use: tap position, counters, operating modes.
legend.cdc.ens=Enumerated Status — stVal <i>enum</i>. Use: named equipment states.
legend.cdc.bcr=Binary Counter Reading — actVal <i>INT64</i>. Use: MMTR (active energy kWh, reactive kVArh).
legend.cdc.hdr.analog=Analog measurement
legend.cdc.mv=Measured Value — mag.f <i>FLOAT32</i> scalar. Use: frequency, temperature, total power.
legend.cdc.cmv=Complex Measured Value — cVal.mag.f + cVal.ang.f. Use: single-phase phasor (complex pointer).
legend.cdc.wye=Three Phase Y — phsA/phsB/phsC of type CMV. Use: MMXU voltages (Va/Vb/Vc) and currents.
legend.cdc.del=Three Phase Δ — phsAB/phsBC/phsCA of type CMV. Use: MMXU line voltages.
legend.cdc.seq=Sequence Components — c1/c2/c0 CMV. Use: MSQI (symmetrical components: positive, negative, zero).
legend.cdc.hmv=Harmonic Measured Value — harmonics array. Use: MHAI (THD, H1–H50 of voltage and current).
legend.cdc.hdr.control=Control (controllable)
legend.cdc.spc=Single Point Controllable — stVal BOOL + Oper. Use: simple control (LED, block, reset).
legend.cdc.dpc=Double Point Controllable — stVal DPS + Oper. Use: breakers (XCBR) and disconnectors (XSWI/CSWI).
legend.cdc.apc=Analogue Point Controllable — setMag FLOAT32 + Oper. Use: analog setpoint (reference voltage).
legend.cdc.bsc=Binary Controlled Step — valWTr + Oper RAISE/LOWER. Use: tap regulator (ATCC, ITCP).
legend.cdc.hdr.settings=Settings (FC = SP / SG / SE)
legend.cdc.ing=Integer Setting — setVal <i>INT32</i>. Use: delays in ms, attempt counters (RREC).
legend.cdc.spg=Single Point Setting — setVal <i>BOOL</i>. Use: function enable (PDIS, RREC).
legend.cdc.asg=Analogue Setting — setVal <i>FLOAT32</i>. Use: protection thresholds (distance, differential).
legend.cdc.eng=Enumerated Setting — setVal <i>enum</i>. Use: operating mode, protection characteristic.
legend.cdc.hdr.nameplate=Equipment nameplate (FC = DC)
legend.cdc.dpl=Device Name Plate — vendor, model, hwRev, swRev, serNum, location. Use: IED identification.
legend.cdc.lpl=LN Name Plate — vendor, swRev, d (description). Use: identification of each Logical Node.
