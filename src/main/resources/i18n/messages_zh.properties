legend.breaker.title=断路器状态 (DA stVal)
legend.breaker.on=<b>合闸 / ON</b> — 触头闭合 (数值 2)
legend.breaker.off=<b>分闸 / OFF</b> — 触头断开 (数值 1)
legend.breaker.intermediate=<b>中间 / 过渡</b> — 状态不确定 (数值 0 或 3)
legend.colors.title=树中文字颜色
legend.colors.green=绿色 — 激活值: ON, OK, CLOSED, TRUE
legend.colors.red=红色 — 非激活值: OFF, ALARM, OPEN, FALSE
legend.colors.orange=橙色 — 警告: INTERMEDIATE, BAD, WARNING, TEST
legend.colors.purple=紫色 — 节点已闭锁 (FC=BL, blkEna=true)
legend.colors.blue=蓝色 — 节点在监视列表中 (监视激活)
legend.fc.title=Functional Constraints (FC) — IEC 61850-7-2
legend.fc.st=<b>Status</b> — 过程状态: stVal, q, t。客户端只读。
legend.fc.mx=<b>Measurands</b> — 实时模拟测量: mag.f, q, t。
legend.fc.co=<b>Control</b> — 操作命令: Oper, SBOw, Cancel。
legend.fc.cf=<b>Configuration</b> — IED 的配置参数。
legend.fc.dc=<b>Description</b> — 设备铭牌: VendorName, Model, SerialNum。
legend.fc.sp=<b>Setting</b> — IED 的运行整定值 (保护定值)。
legend.fc.sg=<b>Setting Group</b> — 当前激活定值组的选择器。
legend.fc.se=<b>Setting Group Edit</b> — 非激活定值组的编辑。
legend.fc.bl=<b>Blocking</b> — 功能闭锁: blkEna 禁用 LN 的操作。
legend.fc.ex=<b>Extended</b> — 厂商私有属性。
legend.fc.or=<b>Operate Received</b> — 确认已收到操作。
legend.fc.rp=<b>Unbuffered Report</b> — 无缓冲报告控制块 (URCB)。
legend.fc.br=<b>Buffered Report</b> — 带缓冲报告控制块，保留历史记录 (BRCB)。
legend.fc.go=<b>GOOSE</b> — 用于 GOOSE 发布的控制属性 (GoCB)。
legend.cdc.title=Common Data Classes (CDC) — IEC 61850-7-3
legend.cdc.hdr.binary=二进制状态
legend.cdc.sps=Single Point Status — stVal <i>BOOL</i>。用途: ON/OFF 信号 (告警、辅助触点)。
legend.cdc.dps=Double Point Status — stVal {off | intermediate | on | bad}。用途: 断路器和隔离开关。
legend.cdc.act=Protection Activation — general <i>BOOL</i> + phsA/B/C。用途: PTRC, PDIF, 跳闸信号。
legend.cdc.acd=Directional Protection Activation — general + dirGeneral {forward | backward}。用途: PDIR, PDIS。
legend.cdc.hdr.intenum=整数 / 枚举状态
legend.cdc.ins=Integer Status — stVal <i>INT32</i>。用途: 分接位置、计数器、运行模式。
legend.cdc.ens=Enumerated Status — stVal <i>enum</i>。用途: 设备的命名状态。
legend.cdc.bcr=Binary Counter Reading — actVal <i>INT64</i>。用途: MMTR (有功能量 kWh, 无功能量 kVArh)。
legend.cdc.hdr.analog=模拟量测量
legend.cdc.mv=Measured Value — mag.f <i>FLOAT32</i> 标量。用途: 频率、温度、总功率。
legend.cdc.cmv=Complex Measured Value — cVal.mag.f + cVal.ang.f。用途: 单相相量 (复数指针)。
legend.cdc.wye=Three Phase Y — phsA/phsB/phsC 类型为 CMV。用途: MMXU 电压 (Va/Vb/Vc) 及电流。
legend.cdc.del=Three Phase Δ — phsAB/phsBC/phsCA 类型为 CMV。用途: MMXU 线电压。
legend.cdc.seq=Sequence Components — c1/c2/c0 CMV。用途: MSQI (对称分量: 正序、负序、零序)。
legend.cdc.hmv=Harmonic Measured Value — 谐波数组。用途: MHAI (电压和电流的 THD, H1–H50)。
legend.cdc.hdr.control=控制 (可控)
legend.cdc.spc=Single Point Controllable — stVal BOOL + Oper。用途: 简单控制 (LED、闭锁、复位)。
legend.cdc.dpc=Double Point Controllable — stVal DPS + Oper。用途: 断路器 (XCBR) 和隔离开关 (XSWI/CSWI)。
legend.cdc.apc=Analogue Point Controllable — setMag FLOAT32 + Oper。用途: 模拟设定点 (参考电压)。
legend.cdc.bsc=Binary Controlled Step — valWTr + Oper RAISE/LOWER。用途: 分接开关调节器 (ATCC, ITCP)。
legend.cdc.hdr.settings=定值 (FC = SP / SG / SE)
legend.cdc.ing=Integer Setting — setVal <i>INT32</i>。用途: 延时 (ms)、尝试次数计数器 (RREC)。
legend.cdc.spg=Single Point Setting — setVal <i>BOOL</i>。用途: 功能使能 (PDIS, RREC)。
legend.cdc.asg=Analogue Setting — setVal <i>FLOAT32</i>。用途: 保护门槛 (距离、差动)。
legend.cdc.eng=Enumerated Setting — setVal <i>enum</i>。用途: 运行模式、保护特性。
legend.cdc.hdr.nameplate=设备铭牌 (FC = DC)
legend.cdc.dpl=Device Name Plate — vendor, model, hwRev, swRev, serNum, location。用途: IED 标识。
legend.cdc.lpl=LN Name Plate — vendor, swRev, d (描述)。用途: 每个逻辑节点的标识。
