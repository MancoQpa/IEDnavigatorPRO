legend.nodetypes.title=Tipos de nodo en el árbol
legend.nodetypes.ld=<b>LD</b> — Logical Device (Dispositivo Lógico)
legend.nodetypes.do=<b>DO</b> — Data Object (Objeto de Datos)
legend.nodetypes.da=<b>DA / BDA</b> — Data Attribute (Atributo de Dato)
legend.lngroups.title=Nodos Lógicos (LN) por grupo IEC 61850-7-4
legend.lngroups.x=<b>Grupo X</b> — Equipos de corte: XCBR (disyuntor)
legend.lngroups.xc=<b>Grupo X / C</b> — Seccionadores y control: XSWI, CSWI, CILO
legend.lngroups.c=<b>Grupo C</b> — Control: CPOW, CPDM y otros
legend.lngroups.m1=<b>Grupo M</b> — Medición: MMXU, MSQI, MHAI (medidor azul)
legend.lngroups.m2=<b>Grupo M</b> — Energía y demanda: MMTR, MSTA (medidor verde)
legend.lngroups.p=<b>Grupo P</b> — Protección: PDIS, PDIF, PTRC, PDIR…
legend.lngroups.r=<b>Grupo R</b> — Funciones relacionadas con protección: RREC, RPSB, RSYN…
legend.lngroups.a=<b>Grupo A</b> — Control automático: ATCC, ARCO, ARIS…
legend.lngroups.l=<b>Grupo L</b> — Nodos de sistema: LLN0 (nodo cero), LPHD (salud del IED)
legend.lngroups.g=<b>Grupo G</b> — Genérico: GAPC, GGIO
legend.lngroups.s=<b>Grupo S</b> — Supervisión y sensores: STMP, SARC, SIMG…
legend.lngroups.t=<b>Grupo T</b> — Transformadores de instrumento: TCTR, TVTR
legend.lngroups.i=<b>Grupo I</b> — Interfaz: IHMI, ITCI, ITMI…
legend.lngroups.z=<b>Grupo Z</b> — Otros equipos de potencia: ZAXN, ZBAT…
legend.lngroups.unclassified=<b>Sin clasificar</b> — LN con nombre personalizado de fabricante no reconocido
legend.breaker.title=Estados de disyuntor (DA stVal)
legend.breaker.on=<b>Cerrado / ON</b> — Contacto cerrado (valor 2)
legend.breaker.off=<b>Abierto / OFF</b> — Contacto abierto (valor 1)
legend.breaker.intermediate=<b>Intermedio / Transitorio</b> — Estado indefinido (valor 0 o 3)
legend.colors.title=Colores de texto en el árbol
legend.colors.green=Verde — Valor activo: ON, OK, CLOSED, TRUE
legend.colors.red=Rojo — Valor inactivo: OFF, ALARM, OPEN, FALSE
legend.colors.orange=Naranja — Advertencia: INTERMEDIATE, BAD, WARNING, TEST
legend.colors.purple=Violeta — Nodo bloqueado (FC=BL, blkEna=true)
legend.colors.blue=Azul — Nodo en Watchlist (monitoreo activo)
legend.fc.title=Functional Constraints (FC) — IEC 61850-7-2
legend.fc.st=<b>Status</b> — Estado del proceso: stVal, q, t. Solo lectura desde cliente.
legend.fc.mx=<b>Measurands</b> — Mediciones analógicas en tiempo real: mag.f, q, t.
legend.fc.co=<b>Control</b> — Comandos de maniobra: Oper, SBOw, Cancel.
legend.fc.cf=<b>Configuration</b> — Parámetros de configuración del IED.
legend.fc.dc=<b>Description</b> — Placa del equipo: VendorName, Model, SerialNum.
legend.fc.sp=<b>Setting</b> — Ajustes operativos del IED (setpoints de protección).
legend.fc.sg=<b>Setting Group</b> — Selector del grupo activo de ajustes.
legend.fc.se=<b>Setting Group Edit</b> — Edición del grupo inactivo de ajustes.
legend.fc.bl=<b>Blocking</b> — Bloqueo funcional: blkEna inhabilita operación del LN.
legend.fc.ex=<b>Extended</b> — Atributos propietarios del fabricante.
legend.fc.or=<b>Operate Received</b> — Confirmación de recepción de operación.
legend.fc.rp=<b>Unbuffered Report</b> — Control de reporte sin buffer (URCB).
legend.fc.br=<b>Buffered Report</b> — Control de reporte con buffer, conserva histórico (BRCB).
legend.fc.go=<b>GOOSE</b> — Atributos de control para publicación GOOSE (GoCB).
legend.cdc.title=Clases de Datos Comunes (CDC) — IEC 61850-7-3
legend.cdc.hdr.binary=Estado binario
legend.cdc.sps=Single Point Status — stVal <i>BOOL</i>. Uso: señales ON/OFF (alarmas, contactos auxiliares).
legend.cdc.dps=Double Point Status — stVal {off | intermediate | on | bad}. Uso: disyuntores y seccionadores.
legend.cdc.act=Protection Activation — general <i>BOOL</i> + phsA/B/C. Uso: PTRC, PDIF, señales de disparo.
legend.cdc.acd=Directional Protection Activation — general + dirGeneral {forward | backward}. Uso: PDIR, PDIS.
legend.cdc.hdr.intenum=Estado entero / enumerado
legend.cdc.ins=Integer Status — stVal <i>INT32</i>. Uso: posición de tap, contadores, modos de operación.
legend.cdc.ens=Enumerated Status — stVal <i>enum</i>. Uso: estados nombrados de equipos.
legend.cdc.bcr=Binary Counter Reading — actVal <i>INT64</i>. Uso: MMTR (energía activa kWh, reactiva kVArh).
legend.cdc.hdr.analog=Medición analógica
legend.cdc.mv=Measured Value — mag.f <i>FLOAT32</i> escalar. Uso: frecuencia, temperatura, potencia total.
legend.cdc.cmv=Complex Measured Value — cVal.mag.f + cVal.ang.f. Uso: fasorial monofásico (puntero complejo).
legend.cdc.wye=Three Phase Y — phsA/phsB/phsC de tipo CMV. Uso: MMXU tensiones (Va/Vb/Vc) y corrientes.
legend.cdc.del=Three Phase Δ — phsAB/phsBC/phsCA de tipo CMV. Uso: MMXU tensiones de línea.
legend.cdc.seq=Sequence Components — c1/c2/c0 CMV. Uso: MSQI (componentes simétricas: directa, inversa, homopolar).
legend.cdc.hmv=Harmonic Measured Value — array de armónicos. Uso: MHAI (THD, H1–H50 de tensión y corriente).
legend.cdc.hdr.control=Control (comandables)
legend.cdc.spc=Single Point Controllable — stVal BOOL + Oper. Uso: control simple (LED, bloqueo, reset).
legend.cdc.dpc=Double Point Controllable — stVal DPS + Oper. Uso: disyuntores (XCBR) y seccionadores (XSWI/CSWI).
legend.cdc.apc=Analogue Point Controllable — setMag FLOAT32 + Oper. Uso: setpoint analógico (tensión de referencia).
legend.cdc.bsc=Binary Controlled Step — valWTr + Oper RAISE/LOWER. Uso: regulador de tap (ATCC, ITCP).
legend.cdc.hdr.settings=Ajustes (FC = SP / SG / SE)
legend.cdc.ing=Integer Setting — setVal <i>INT32</i>. Uso: retardos en ms, contadores de intentos (RREC).
legend.cdc.spg=Single Point Setting — setVal <i>BOOL</i>. Uso: habilitación de funciones (PDIS, RREC).
legend.cdc.asg=Analogue Setting — setVal <i>FLOAT32</i>. Uso: umbrales de protección (distancia, diferencial).
legend.cdc.eng=Enumerated Setting — setVal <i>enum</i>. Uso: modo de operación, característica de protección.
legend.cdc.hdr.nameplate=Placa del equipo (FC = DC)
legend.cdc.dpl=Device Name Plate — vendor, model, hwRev, swRev, serNum, location. Uso: identificación del IED.
legend.cdc.lpl=LN Name Plate — vendor, swRev, d (descripción). Uso: identificación de cada Nodo Lógico.
